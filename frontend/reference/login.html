<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PRISM Intelligence - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#33343c",
              "on-surface": "#e1e2ec",
              "on-surface-variant": "#c3c6d6",
              "secondary-fixed-dim": "#c4c6d0",
              "secondary-fixed": "#e0e2ec",
              secondary: "#c4c6d0",
              "tertiary-fixed": "#ffdbc9",
              "on-primary-fixed-variant": "#003fa4",
              "on-secondary": "#2d3038",
              "on-tertiary": "#532200",
              surface: "#11131a",
              "inverse-surface": "#e1e2ec",
              background: "#11131a",
              "on-primary-fixed": "#001849",
              "tertiary-container": "#bf5800",
              "surface-dim": "#11131a",
              "surface-bright": "#373941",
              "surface-container-high": "#282a31",
              "on-error": "#690005",
              "surface-tint": "#b3c5ff",
              "on-tertiary-container": "#ffffff",
              "surface-container-low": "#191b23",
              "inverse-on-surface": "#2e3038",
              "outline-variant": "#434654",
              tertiary: "#ffb68c",
              "on-secondary-container": "#b3b5be",
              "surface-container": "#1d1f27",
              primary: "#b3c5ff",
              outline: "#8d909f",
              "surface-container-lowest": "#0c0e15",
              "on-error-container": "#ffdad6",
              "secondary-container": "#44474f",
              "on-secondary-fixed": "#191c22",
              "on-tertiary-fixed-variant": "#763400",
              "primary-fixed": "#dbe1ff",
              "surface-variant": "#33343c",
              "tertiary-fixed-dim": "#ffb68c",
              "error-container": "#93000a",
              "on-secondary-fixed-variant": "#44474f",
              error: "#ffb4ab",
              "inverse-primary": "#1656cf",
              "primary-fixed-dim": "#b3c5ff",
              "on-primary-container": "#ffffff",
              "primary-container": "#3b6fe8",
              "on-primary": "#002b75",
              "on-tertiary-fixed": "#321200",
              "on-background": "#e1e2ec",
              "ui-border": "#252830",
              "ui-panel": "#111318",
              "ui-bg": "#0A0C10",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
              btn: "6px",
            },
            spacing: {
              xl: "32px",
              lg: "24px",
              "margin-mobile": "16px",
              sm: "8px",
              unit: "4px",
              xs: "4px",
              "margin-desktop": "32px",
              gutter: "16px",
              md: "16px",
            },
            fontFamily: {
              "headline-md": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "display-lg": ["Inter"],
              "body-sm": ["Inter"],
              "data-mono-bold": ["JetBrains Mono"],
              "headline-sm": ["Inter"],
              "label-mono": ["JetBrains Mono"],
            },
            fontSize: {
              "headline-md": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "32px", fontWeight: "700" },
              ],
              "display-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "data-mono-bold": [
                "14px",
                { lineHeight: "20px", fontWeight: "700" },
              ],
              "headline-sm": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
              "label-mono": ["13px", { lineHeight: "16px", fontWeight: "500" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0a0c10;
        color: #e1e2ec;
        font-family: "Inter", sans-serif;
      }
      .input-field {
        background-color: #111318;
        border: 1px solid #252830;
        color: #e1e2ec;
      }
      .input-field:focus {
        border-color: #3b6fe8;
        outline: none;
        box-shadow: none;
      }
      .btn-primary {
        background-color: #3b6fe8;
        color: #ffffff;
      }
      .btn-primary:hover {
        background-color: #2b5bc2;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="min-h-screen w-full flex overflow-hidden">
    <!-- Left Half: Atmosphere / Map -->
    <div
      class="hidden lg:flex w-1/2 h-screen relative bg-[#0A0C10] border-r border-[#252830]"
    >
      <!-- Animated Map Asset -->
      <!-- STITCH_SVG_START:ANIMATION_1 class="w-full h-full p-20 object-contain opacity-70" -->
      <div
        class="w-full h-full p-20 object-contain opacity-70"
        id="animated-svg-ANIMATION_1"
        style="display: block"
      >
        <svg
          style="background: #0a0c10"
          viewBox="0 0 800 1000"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Simplified Karnataka Boundary Path (Representative Silhouette) -->
          <path
            d="M400,50 L450,100 L500,150 L550,250 L580,400 L550,550 L500,750 L450,900 L350,950 L250,900 L200,800 L150,650 L100,500 L120,350 L180,200 L250,100 Z"
            fill="none"
            stroke="#3B6FE8"
            stroke-opacity="0.3"
            stroke-width="1.5"
          >
            <animate
              attributeName="stroke-opacity"
              dur="4s"
              repeatCount="indefinite"
              values="0.2;0.4;0.2"
            ></animate>
          </path>
          <!-- District Grid Lines (Minimalist abstraction) -->
          <path
            d="M200,300 L500,300 M250,500 L550,500 M300,700 L500,700"
            stroke="#3B6FE8"
            stroke-opacity="0.1"
            stroke-width="0.5"
          ></path>
          <!-- Pulsing Hotspots (Active Intelligence Nodes) -->
          <!-- Danger Red -->
          <circle cx="420" cy="350" fill="#E84040" r="4">
            <animate
              attributeName="r"
              dur="2s"
              repeatCount="indefinite"
              values="3;6;3"
            ></animate>
            <animate
              attributeName="opacity"
              dur="2s"
              repeatCount="indefinite"
              values="1;0.4;1"
            ></animate>
          </circle>
          <circle
            cx="420"
            cy="350"
            fill="none"
            opacity="0"
            r="12"
            stroke="#E84040"
            stroke-width="1"
          >
            <animate
              attributeName="r"
              dur="2s"
              repeatCount="indefinite"
              values="4;20"
            ></animate>
            <animate
              attributeName="opacity"
              dur="2s"
              repeatCount="indefinite"
              values="0.5;0"
            ></animate>
          </circle>
          <!-- Warning Orange -->
          <circle cx="320" cy="600" fill="#E8A030" r="4">
            <animate
              attributeName="r"
              dur="2.5s"
              repeatCount="indefinite"
              values="3;6;3"
            ></animate>
            <animate
              attributeName="opacity"
              dur="2.5s"
              repeatCount="indefinite"
              values="1;0.4;1"
            ></animate>
          </circle>
          <circle
            cx="320"
            cy="600"
            fill="none"
            opacity="0"
            r="12"
            stroke="#E8A030"
            stroke-width="1"
          >
            <animate
              attributeName="r"
              dur="2.5s"
              repeatCount="indefinite"
              values="4;18"
            ></animate>
            <animate
              attributeName="opacity"
              dur="2.5s"
              repeatCount="indefinite"
              values="0.5;0"
            ></animate>
          </circle>
          <!-- More Nodes -->
          <circle cx="480" cy="220" fill="#E84040" opacity="0.8" r="3">
            <animate
              attributeName="opacity"
              dur="3s"
              repeatCount="indefinite"
              values="0.8;0.2;0.8"
            ></animate>
          </circle>
          <circle cx="350" cy="150" fill="#E8A030" opacity="0.8" r="3">
            <animate
              attributeName="opacity"
              dur="3.5s"
              repeatCount="indefinite"
              values="0.8;0.2;0.8"
            ></animate>
          </circle>
        </svg>
      </div>
      <!-- STITCH_SVG_END:ANIMATION_1 -->
      <!-- Subtle tactical overlay elements -->
      <div
        class="absolute top-8 left-8 flex items-center gap-2 text-on-surface-variant font-label-mono text-label-mono"
      >
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
        SYS.OP.ACTIVE
      </div>
      <div
        class="absolute bottom-8 left-8 flex flex-col gap-1 text-outline font-label-mono text-xs opacity-60"
      >
        <span class="">SEC-A // GRID: 44.8291, -73.2910</span>
        <span class="">DATA FEED: ENCRYPTED // TIER-1</span>
      </div>
    </div>
    <!-- Right Half: Login Form -->
    <div
      class="w-full lg:w-1/2 h-screen bg-[#0A0C10] flex flex-col justify-between px-8 py-8 lg:px-24"
    >
      <!-- Header Branding -->
      <div class="mt-8">
        <div
          class="font-label-mono text-label-mono tracking-[0.2em] text-on-surface-variant uppercase"
        >
          PRISM
        </div>
        <div class="font-body-sm text-body-sm text-outline mt-1">
          Crime Intelligence &amp; Analytics Platform
        </div>
      </div>
      <!-- Centered Login Container -->
      <div class="w-full max-w-sm mx-auto flex flex-col justify-center h-full">
        <h1 class="font-headline-md text-headline-md text-on-surface mb-8">
          System Access
        </h1>
        <form class="space-y-6">
          <!-- Employee ID Field -->
          <div class="space-y-2">
            <label
              class="block font-body-sm text-body-sm text-on-surface-variant"
              for="employee-id"
            >
              Employee ID
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline text-[18px]"
                  >badge</span
                >
              </span>
              <input
                class="input-field block w-full pl-10 pr-3 py-2 sm:text-sm font-data-mono-bold text-data-mono-bold rounded-none transition-colors duration-200"
                id="employee-id"
                name="employee-id"
                placeholder="e.g. KSP-90210"
                required=""
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <label
              class="block font-body-sm text-body-sm text-on-surface-variant"
              for="password"
            >
              Password
            </label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline text-[18px]"
                  >lock</span
                >
              </span>
              <input
                class="input-field block w-full pl-10 pr-3 py-2 sm:text-sm font-data-mono-bold text-data-mono-bold rounded-none transition-colors duration-200"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
            </div>
          </div>
          <!-- Helper Text -->
          <p class="font-body-sm text-[12px] text-outline leading-tight">
            Role is automatically assigned based on your credentials.
          </p>
          <!-- Submit Button -->
          <button
            class="btn-primary w-full flex justify-center py-3 px-4 rounded-btn font-body-md text-body-md font-semibold transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-[#0A0C10]"
            type="button"
          >
            Sign In
          </button>
          <div class="flex items-center justify-between mt-4">
            <a
              class="font-body-sm text-body-sm text-primary hover:text-primary-fixed transition-colors"
              href="#"
              >Request Access</a
            >
            <a
              class="font-body-sm text-body-sm text-primary hover:text-primary-fixed transition-colors"
              href="#"
              >Forgot Password?</a
            >
          </div>
        </form>
      </div>
      <!-- Footer -->
      <div class="mb-4 text-center lg:text-left">
        <p class="font-body-sm text-[12px] text-outline">
          Karnataka State Police — Authorized Personnel Only
        </p>
      </div>
    </div>
  </body>
</html>
