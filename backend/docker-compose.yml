version: '3.8'

services:
  backend:
    build: .
    container_name: prism-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - X_ZOHO_CATALYST_LISTEN_PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
